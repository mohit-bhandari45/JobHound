tasks:
  install:
    command: uv sync
  dev:
    command: uv run fastapi dev --host 0.0.0.0 --port 8000
    options:
      persistent: true
  start:
    command: uv run fastapi dev --host 0.0.0.0
    options:
      persistent: true
  migrate:
    command: uv run alembic upgrade head
  makemigrations:
    command: uv run alembic revision --autogenerate -m
